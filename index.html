<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  
  <title>Social links profile</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="profile" role="main">
    <header class="profile__header">
      <img
        class="profile__avatar"
        src="images/avatar-jessica.jpeg"
        alt="Portrait of Jessica Randall"
      />

      <div class="profile__details">
        <h1 class="profile__name">Jessica Randall</h1>
        <a class="link" href="#" rel="noopener">London,</a> 
      <a class="link" href="#">United kingdom</a>
      <p>Front-end developper and avid reader.</p>
      </div>
    </header>

    <nav class="profile__links" aria-label="Social links">
      <a class="profile__link" href="https://github.com/arnold722" rel="noopener">GitHub</a>
      <a class="profile__link" href="https://www.frontendmentor.io/profile/arnold722"  rel="noopener">Frontend Mentor</a>
      <a class="profile__link" href="#"  rel="noopener">LinkedIn</a>
      <a class="profile__link" href="#"  rel="noopener">Twitter</a>
      <a class="profile__link" href="#"  rel="noopener">Instagram</a>
    </nav>
  </main>
  </div>
</body>
</html>
